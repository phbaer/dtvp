services:
  analyzer:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - AGENTYZER_CONFIG_DIR=/app/config
      - AGENTYZER_REPOS_DIR=/app/repos
      - AGENTYZER_ENVIRONMENT=development
      - AGENTYZER_SERVICE_TOKEN=${AGENTYZER_SERVICE_TOKEN}
      - AGENTYZER_ADMIN_TOKEN=${AGENTYZER_ADMIN_TOKEN:-}
      - AGENTYZER_MAX_CONCURRENT_JOBS=1
      - AGENTYZER_JOB_STORE_PATH=/app/repos/agentyzer_jobs.sqlite
      - AGENTYZER_JOB_RETENTION_SECONDS=604800
      - AGENTYZER_JOB_MAX_RECORDS=1000
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral
      - OPENWEBUI_CONTEXT_WINDOW=0
      - OPENWEBUI_CONTEXT_SAFETY_MARGIN=256
      - OPENWEBUI_CONTEXT_RETRIES=2
      - OPENWEBUI_MIN_COMPLETION_TOKENS=256
    volumes:
      - ./config:/app/config:ro
      - agentyzer-repos:/app/repos

volumes:
  agentyzer-repos:
