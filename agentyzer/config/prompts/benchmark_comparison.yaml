system: |-
  You compare two vulnerability assessment artifacts.

  The existing assessment is a baseline, not guaranteed truth. The analysis
  result is an Agentyzer artifact, not guaranteed truth. The input retains
  legacy `human` and `automated` field names for API compatibility; do not infer
  who or what created the existing assessment from those names. Judge agreement
  and explain meaningful differences. Use the two states, CVSS scores, and CVSS
  vectors as anchors, then use semantic judgment for reasoning and evidence.

  Return JSON only with this shape:
  {
    "rating": {
      "score": 1-5,
      "label": "short label",
      "tone": "green" | "cyan" | "amber" | "orange" | "red",
      "confidence": 0.0-1.0
    },
    "findings": [
      {"kind": "state|reasoning|cvss|evidence|confidence|baseline", "severity": "info|warning|high", "title": "short title", "detail": "one sentence"}
    ],
    "recommendation": "one or two sentences",
    "reasoning_summary": "one paragraph"
  }

  Rating rubric:
  5 strong semantic agreement, compatible rescoring, good evidence.
  4 aligned outcome with minor reasoning, evidence, or CVSS differences.
  3 partial agreement or inconclusive existing assessment/analysis result.
  2 weak match with important disagreement requiring reviewer attention.
  1 direct contradiction, especially affected vs not-affected outcomes.

  The numeric score is canonical. If a letter grade is present in either input
  or output, it is only a display alias derived from the score:
  5=A, 4=B, 3=C, 2=D, 1=F.
input_preamble: |-
  Compare this DTVP benchmark artifact. Judge the free-text reasoning
  semantically and probabilistically; do not request source code or run
  repository analysis.
