x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  dtvp:
    image: ${DTVP_IMAGE:-git.baer.one/phbaer/dtvp:latest}
    ports:
      - "${DTVP_HTTP_BIND_ADDRESS:-127.0.0.1}:${DTVP_HTTP_PORT:-8000}:8000"
    env_file:
      - ./dtvp.env
    environment:
      DTVP_VULNERABILITY_BACKEND_API_KEY: ""
      DTVP_VULNERABILITY_BACKEND_API_KEY_FILE: /run/secrets/dtvp_vulnerability_backend_api_key
      DTVP_VULNERABILITY_BACKEND_IMPORT_API_KEY: ""
      DTVP_VULNERABILITY_BACKEND_IMPORT_API_KEY_FILE: /run/secrets/dtvp_vulnerability_backend_import_api_key
      DTVP_SESSION_SECRET_KEY: ""
      DTVP_SESSION_SECRET_KEY_FILE: /run/secrets/dtvp_session_secret_key
      DTVP_SESSION_PREVIOUS_SECRET_KEY: ""
      DTVP_SESSION_PREVIOUS_SECRET_KEY_FILE: /run/secrets/dtvp_session_previous_secret_key
      DTVP_OIDC_CLIENT_SECRET: ""
      DTVP_OIDC_CLIENT_SECRET_FILE: /run/secrets/dtvp_oidc_client_secret
      DTVP_CODE_ANALYSIS_SERVICE_TOKEN: ""
      DTVP_CODE_ANALYSIS_SERVICE_TOKEN_FILE: /run/secrets/agentyzer_service_token
      DTVP_CODE_ANALYSIS_ADMIN_TOKEN: ""
      DTVP_CODE_ANALYSIS_ADMIN_TOKEN_FILE: /run/secrets/agentyzer_admin_token
    secrets:
      - dtvp_vulnerability_backend_api_key
      - dtvp_vulnerability_backend_import_api_key
      - dtvp_session_secret_key
      - dtvp_session_previous_secret_key
      - dtvp_oidc_client_secret
      - agentyzer_service_token
      - agentyzer_admin_token
    volumes:
      - dtvp-data:/app/data
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - |
          import http.client, os, urllib.parse
          context = "/" + os.environ.get("DTVP_CONTEXT_PATH", "/").strip("/")
          context = "" if context == "/" else context
          frontend = urllib.parse.urlsplit(os.environ["DTVP_FRONTEND_URL"])
          connection = http.client.HTTPConnection("127.0.0.1", 8000, timeout=5)
          connection.request("GET", context + "/readyz", headers={"Host": frontend.netloc})
          response = connection.getresponse()
          response.read()
          connection.close()
          raise SystemExit(0 if response.status == 200 else 1)
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - analysis
      - dtvp-outbound
    pids_limit: 256
    logging: *default-logging
    depends_on:
      agentyzer:
        condition: service_healthy
    restart: unless-stopped

  agentyzer:
    image: ${AGENTYZER_IMAGE:-git.baer.one/phbaer/agentyzer:latest}
    env_file:
      - ./agentyzer.env
    environment:
      AGENTYZER_SERVICE_TOKEN: ""
      AGENTYZER_SERVICE_TOKEN_FILE: /run/secrets/agentyzer_service_token
      AGENTYZER_ADMIN_TOKEN: ""
      AGENTYZER_ADMIN_TOKEN_FILE: /run/secrets/agentyzer_admin_token
      AGENTYZER_OPENWEBUI_API_KEY: ""
      AGENTYZER_OPENWEBUI_API_KEY_FILE: /run/secrets/agentyzer_openwebui_api_key
    secrets:
      - agentyzer_service_token
      - agentyzer_admin_token
      - agentyzer_openwebui_api_key
    volumes:
      - agentyzer-repos:/app/repos
      - ./repos.yaml:/app/config/repos.yaml:ro
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - |
          import http.client, os, pathlib
          token = pathlib.Path(os.environ["AGENTYZER_SERVICE_TOKEN_FILE"]).read_text(encoding="utf-8").strip()
          connection = http.client.HTTPConnection("127.0.0.1", 8000, timeout=5)
          connection.request("GET", "/readyz", headers={"Authorization": "Bearer " + token, "X-Agentyzer-Owner": "healthcheck"})
          response = connection.getresponse()
          response.read()
          connection.close()
          raise SystemExit(0 if response.status == 200 else 1)
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - analysis
      - agentyzer-outbound
    pids_limit: 512
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  dtvp-data:
  agentyzer-repos:

secrets:
  dtvp_vulnerability_backend_api_key:
    environment: DTVP_VULNERABILITY_BACKEND_API_KEY
  dtvp_vulnerability_backend_import_api_key:
    environment: DTVP_VULNERABILITY_BACKEND_IMPORT_API_KEY
  dtvp_session_secret_key:
    environment: DTVP_SESSION_SECRET_KEY
  dtvp_session_previous_secret_key:
    environment: DTVP_SESSION_PREVIOUS_SECRET_KEY
  dtvp_oidc_client_secret:
    environment: DTVP_OIDC_CLIENT_SECRET
  agentyzer_service_token:
    environment: AGENTYZER_SERVICE_TOKEN
  agentyzer_admin_token:
    environment: AGENTYZER_ADMIN_TOKEN
  agentyzer_openwebui_api_key:
    environment: AGENTYZER_OPENWEBUI_API_KEY

networks:
  analysis:
    internal: true
  dtvp-outbound:
  agentyzer-outbound:
