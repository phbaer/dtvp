version: '3.8'

services:
  mock-dt:
    image: python:3.11-slim
    command: sh -c "pip install fastapi uvicorn && uvicorn mock_dt:app --host 0.0.0.0 --port 8081"
    working_dir: /app
    volumes:
      - ./mock_dt.py:/app/mock_dt.py:z
    ports:
      - "8081:8081"
    networks:
      - default

networks:
  default:
