services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dtvp
      - dtrack-frontend
      - dtrack-apiserver

  dtrack-apiserver:
    image: dependencytrack/apiserver:4.14.1
    environment:
      - ALPINE_DATABASE_MODE=external
      - ALPINE_DATABASE_URL=jdbc:postgresql://postgres:5432/dtrack
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_USERNAME=dtrack
      - ALPINE_DATABASE_PASSWORD=dtrack
    depends_on:
      - postgres
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend:4.14.1
    environment:
      - API_BASE_URL=/api
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=dtrack
      - POSTGRES_PASSWORD=dtrack
      - POSTGRES_DB=dtrack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  dtvp:
    build:
      context: .
      args:
        DTVP_CONTEXT_PATH: /dtvp
    environment:
      - DTVP_DT_API_URL=http://dtrack-apiserver:8081
      - DTVP_DT_API_KEY=change_me # You need to generate this in D-T and update it
      - DTVP_CONTEXT_PATH=/dtvp
      - DTVP_FRONTEND_URL=http://localhost/dtvp
      # If using OIDC via D-T, these might not be needed if we rely on headers, 
      # but we need SESSION_SECRET for the fallback cookie if used.
      - DTVP_SESSION_SECRET_KEY=change_me
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped

volumes:
  postgres-data:
