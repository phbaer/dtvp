services:
  nginx:
    image: nginx:alpine
    ports:
      - "${DTVP_HTTP_PORT:-80}:80"
    environment:
      DTVP_CONTEXT_PATH: ${DTVP_CONTEXT_PATH:-/dtvp}
      DTVP_SERVER_NAME: ${DTVP_SERVER_NAME:-localhost}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - dtvp
      - dtrack-frontend
      - dtrack-apiserver

  dtrack-apiserver:
    image: dependencytrack/apiserver:4.14.1
    environment:
      - ALPINE_DATABASE_MODE=external
      - ALPINE_DATABASE_URL=jdbc:postgresql://postgres:5432/dtrack
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_USERNAME=dtrack
      - ALPINE_DATABASE_PASSWORD=dtrack
    depends_on:
      - postgres
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend:4.14.1
    environment:
      - API_BASE_URL=/api
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=dtrack
      - POSTGRES_PASSWORD=dtrack
      - POSTGRES_DB=dtrack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  dtvp:
    build:
      context: .
      args:
        DTVP_CONTEXT_PATH: /dtvp
    env_file:
      - path: .env
        required: false
    environment:
      DTVP_ENVIRONMENT: ${DTVP_ENVIRONMENT:-production}
      DTVP_DT_API_URL: ${DTVP_DT_API_URL:-http://dtrack-apiserver:8080}
      DTVP_DT_API_KEY: ${DTVP_DT_API_KEY:-}
      DTVP_DT_API_KEY_FILE: ${DTVP_DT_API_KEY_FILE:-}
      DTVP_DT_IMPORT_API_KEY: ${DTVP_DT_IMPORT_API_KEY:-}
      DTVP_DT_IMPORT_API_KEY_FILE: ${DTVP_DT_IMPORT_API_KEY_FILE:-}
      DTVP_DT_CACHE_PATH: ${DTVP_DT_CACHE_PATH:-data/dt_cache}
      DTVP_CONTEXT_PATH: ${DTVP_CONTEXT_PATH:-/dtvp}
      DTVP_FRONTEND_URL: ${DTVP_FRONTEND_URL:-http://localhost/dtvp}
      DTVP_ALLOWED_HOSTS: ${DTVP_ALLOWED_HOSTS:-}
      DTVP_TRUSTED_PROXY_CIDRS: ${DTVP_TRUSTED_PROXY_CIDRS:-}
      DTVP_SECURITY_AUDIT_PATH: ${DTVP_SECURITY_AUDIT_PATH:-data/security_audit.jsonl}
      DTVP_SECURITY_AUDIT_FSYNC: ${DTVP_SECURITY_AUDIT_FSYNC:-false}
      DTVP_RATE_LIMIT_WINDOW_SECONDS: ${DTVP_RATE_LIMIT_WINDOW_SECONDS:-60}
      DTVP_AUTH_RATE_LIMIT: ${DTVP_AUTH_RATE_LIMIT:-30}
      DTVP_EXPENSIVE_RATE_LIMIT: ${DTVP_EXPENSIVE_RATE_LIMIT:-20}
      DTVP_MUTATION_RATE_LIMIT: ${DTVP_MUTATION_RATE_LIMIT:-120}
      DTVP_ATTRIBUTION_AGE_FILTER_DAYS: ${DTVP_ATTRIBUTION_AGE_FILTER_DAYS:-7d,14d,28d}
      DTVP_JIRA_CREATE_URL: ${DTVP_JIRA_CREATE_URL:-}
      DTVP_SESSION_SECRET_KEY: ${DTVP_SESSION_SECRET_KEY:-}
      DTVP_SESSION_TTL_SECONDS: ${DTVP_SESSION_TTL_SECONDS:-28800}
      DTVP_SESSION_COOKIE_SECURE: ${DTVP_SESSION_COOKIE_SECURE:-true}
      DTVP_OIDC_ALLOWED_ALGORITHMS: ${DTVP_OIDC_ALLOWED_ALGORITHMS:-RS256}
      DTVP_OIDC_TRANSACTION_TTL_SECONDS: ${DTVP_OIDC_TRANSACTION_TTL_SECONDS:-300}
      DTVP_PROJECT_ARCHIVE_PATH: ${DTVP_PROJECT_ARCHIVE_PATH:-data/project_archives}
      DTVP_PROJECT_ARCHIVE_EXPANDED_ENABLED: ${DTVP_PROJECT_ARCHIVE_EXPANDED_ENABLED:-false}
      DTVP_PROJECT_ARCHIVE_EXPANDED_PATH: ${DTVP_PROJECT_ARCHIVE_EXPANDED_PATH:-data/project_archives_git}
      DTVP_PROJECT_ARCHIVE_SNAPSHOT_ENABLED: ${DTVP_PROJECT_ARCHIVE_SNAPSHOT_ENABLED:-false}
      DTVP_PROJECT_ARCHIVE_INTERVAL_SECONDS: ${DTVP_PROJECT_ARCHIVE_INTERVAL_SECONDS:-86400}
      DTVP_PROJECT_ARCHIVE_RETENTION_COUNT: ${DTVP_PROJECT_ARCHIVE_RETENTION_COUNT:-30}
      DTVP_PROJECT_ARCHIVE_INCLUDE: ${DTVP_PROJECT_ARCHIVE_INCLUDE:-}
      DTVP_CODE_ANALYSIS_URL: ${DTVP_CODE_ANALYSIS_URL:-http://agentyzer:8000}
      DTVP_CODE_ANALYSIS_TIMEOUT_SECONDS: ${DTVP_CODE_ANALYSIS_TIMEOUT_SECONDS:-300}
      DTVP_CODE_ANALYSIS_STATUS_TIMEOUT_SECONDS: ${DTVP_CODE_ANALYSIS_STATUS_TIMEOUT_SECONDS:-5}
      DTVP_CODE_ANALYSIS_SERVICE_TOKEN: ${AGENTYZER_SERVICE_TOKEN:-}
      DTVP_CODE_ANALYSIS_ADMIN_TOKEN: ${AGENTYZER_ADMIN_TOKEN:-}
      DTVP_ANALYSIS_QUEUE_CAPACITY: ${DTVP_ANALYSIS_QUEUE_CAPACITY:-1}
      DTVP_ANALYSIS_QUEUE_STATE_PATH: ${DTVP_ANALYSIS_QUEUE_STATE_PATH:-data/analysis_queue.sqlite}
    volumes:
      - ./data:/app/data
    user: "${DTVP_RUNTIME_UID:-1000}:${DTVP_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - dtrack-apiserver
      - agentyzer
    restart: unless-stopped

  agentyzer:
    build:
      context: ./agentyzer
    env_file:
      - path: .env
        required: false
    environment:
      AGENTYZER_CONFIG_DIR: /app/config
      AGENTYZER_REPOS_DIR: /app/repos
      AGENTYZER_ENVIRONMENT: production
      AGENTYZER_SERVICE_TOKEN: ${AGENTYZER_SERVICE_TOKEN:-}
      AGENTYZER_ADMIN_TOKEN: ${AGENTYZER_ADMIN_TOKEN:-}
      LLM_BACKEND: ${AGENTYZER_LLM_BACKEND:-ollama}
      OLLAMA_HOST: ${AGENTYZER_OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${AGENTYZER_OLLAMA_MODEL:-mistral}
      OPENWEBUI_HOST: ${AGENTYZER_OPENWEBUI_HOST:-http://host.docker.internal:3000}
      OPENWEBUI_MODEL: ${AGENTYZER_OPENWEBUI_MODEL:-mistral}
      OPENWEBUI_API_KEY: ${AGENTYZER_OPENWEBUI_API_KEY:-}
      OPENWEBUI_TOOL_CALLS: ${AGENTYZER_OPENWEBUI_TOOL_CALLS:-auto}
      OPENWEBUI_CONTEXT_WINDOW: ${AGENTYZER_OPENWEBUI_CONTEXT_WINDOW:-0}
      OPENWEBUI_CONTEXT_SAFETY_MARGIN: ${AGENTYZER_OPENWEBUI_CONTEXT_SAFETY_MARGIN:-256}
      OPENWEBUI_CONTEXT_RETRIES: ${AGENTYZER_OPENWEBUI_CONTEXT_RETRIES:-2}
      OPENWEBUI_MIN_COMPLETION_TOKENS: ${AGENTYZER_OPENWEBUI_MIN_COMPLETION_TOKENS:-256}
      AGENTYZER_MAX_CONCURRENT_JOBS: ${AGENTYZER_MAX_CONCURRENT_JOBS:-1}
      AGENTYZER_WORKTREE_RETENTION_SECONDS: ${AGENTYZER_WORKTREE_RETENTION_SECONDS:-86400}
      AGENTYZER_JOB_STORE_PATH: ${AGENTYZER_JOB_STORE_PATH:-/app/repos/agentyzer_jobs.sqlite}
      AGENTYZER_JOB_RETENTION_SECONDS: ${AGENTYZER_JOB_RETENTION_SECONDS:-604800}
      AGENTYZER_JOB_MAX_RECORDS: ${AGENTYZER_JOB_MAX_RECORDS:-1000}
      LOG_LEVEL: ${AGENTYZER_LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:${AGENTYZER_PORT:-8095}:8000"
    volumes:
      - agentyzer-repos:/app/repos
      - ./agentyzer/config/repos.yaml:/app/config/repos.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  dtvp-archive-git-push:
    image: alpine/git:latest
    profiles:
      - archive-git
    working_dir: /repo
    env_file:
      - path: .env
        required: false
    environment:
      DTVP_ARCHIVE_GIT_REMOTE: ${DTVP_ARCHIVE_GIT_REMOTE:-}
      DTVP_ARCHIVE_GIT_BRANCH: ${DTVP_ARCHIVE_GIT_BRANCH:-main}
      DTVP_ARCHIVE_GIT_AUTHOR_NAME: ${DTVP_ARCHIVE_GIT_AUTHOR_NAME:-DTVP Archive Bot}
      DTVP_ARCHIVE_GIT_AUTHOR_EMAIL: ${DTVP_ARCHIVE_GIT_AUTHOR_EMAIL:-dtvp-archive@example.invalid}
      DTVP_ARCHIVE_GIT_SSH_KEY_FILE: ${DTVP_ARCHIVE_GIT_SSH_KEY_FILE:-/ssh/dtvp_archive_deploy_key}
      DTVP_ARCHIVE_GIT_KNOWN_HOSTS_FILE: ${DTVP_ARCHIVE_GIT_KNOWN_HOSTS_FILE:-/ssh/known_hosts}
    volumes:
      - archive-git-repo:/repo
      - ./data/project_archives_git:/archive-tree:ro
      - ./secrets:/ssh:ro
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -eu

        if [ -z "$${DTVP_ARCHIVE_GIT_REMOTE:-}" ]; then
          echo "DTVP_ARCHIVE_GIT_REMOTE is required" >&2
          exit 1
        fi

        if [ -z "$$(find /archive-tree -mindepth 1 -maxdepth 1 -print -quit)" ]; then
          echo "No expanded DTVP archive files found in /archive-tree"
          exit 0
        fi

        git config --global user.name "$${DTVP_ARCHIVE_GIT_AUTHOR_NAME}"
        git config --global user.email "$${DTVP_ARCHIVE_GIT_AUTHOR_EMAIL}"
        git config --global --add safe.directory /repo

        if [ -f "$${DTVP_ARCHIVE_GIT_SSH_KEY_FILE}" ]; then
          export GIT_SSH_COMMAND="ssh -i $${DTVP_ARCHIVE_GIT_SSH_KEY_FILE} -o UserKnownHostsFile=$${DTVP_ARCHIVE_GIT_KNOWN_HOSTS_FILE} -o StrictHostKeyChecking=yes"
        fi

        if [ ! -d .git ]; then
          git clone "$${DTVP_ARCHIVE_GIT_REMOTE}" .
        fi

        git fetch origin "$${DTVP_ARCHIVE_GIT_BRANCH}" || true
        git checkout "$${DTVP_ARCHIVE_GIT_BRANCH}" || git checkout -b "$${DTVP_ARCHIVE_GIT_BRANCH}"
        git pull --ff-only origin "$${DTVP_ARCHIVE_GIT_BRANCH}" || true

        rm -rf project_archives
        mkdir -p project_archives
        cp -a /archive-tree/. project_archives/

        git add project_archives
        if git diff --cached --quiet; then
          echo "No DTVP archive changes to commit"
          exit 0
        fi
        git commit -m "Update DTVP project archives"
        git push origin "$${DTVP_ARCHIVE_GIT_BRANCH}"

volumes:
  postgres-data:
  archive-git-repo:
  agentyzer-repos:
