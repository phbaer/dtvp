name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  test-backend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: uv sync --frozen
      - name: Prepare .env
        run: cp .env.test .env
      - name: Create dummy frontend assets
        run: |
          mkdir -p frontend/dist
          cp tests/assets/index.html frontend/dist/index.html
      - name: Run tests with coverage
        run: uv run pytest
      - name: Upload Python Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-coverage-report
          path: htmlcov/
          retention-days: 30

  test-frontend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies (backend)
        run: uv sync --frozen
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci
      - name: Prepare .env
        run: cp .env.test .env
      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:unit -- --run --coverage
      - name: Upload Vitest Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 30
      - name: Start Dev Stack
        run: |
          npm install -g pm2
          pm2 start ecosystem.config.js
          echo "Waiting for stack to spin up..."
          sleep 15
          pm2 list
          pm2 logs --lines 50 --nostream
      - name: Verify Reachability
        run: |
          curl -f http://localhost:8081/api/v1/project
          curl -f http://localhost:8000/api/projects?name=Vuln
          curl -Is http://localhost:5173 | head -n 1
      - name: Install Playwright browsers
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npx playwright install --with-deps chromium
      - name: Run UI tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm run test:ui -- --reporter=line
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
      - name: Stop Dev Stack
        if: always()
        run: pm2 kill || true

  check-version:
    if: false && github.event.action != 'closed'
    needs: [test-backend, test-frontend]
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      - name: Check Git Tag
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Check remote tags
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "Error: Git tag v$VERSION already exists."
            exit 1
          fi
      - name: Check Docker Tag
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          if curl -I -s -f -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/packages/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/container/dtvp/$VERSION" >/dev/null 2>&1; then
            echo "Error: Docker tag $VERSION already exists in registry."
            exit 1
          fi

  build-push-images:
    if: github.event.action != 'closed'
    needs: [test-backend, test-frontend, check-version]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Install Docker Cli
        run: |-
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
            "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" > /etc/apt/sources.list.d/docker.list
          for i in {1..3}; do apt-get -qq update && break || sleep 5; done
          DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -qq -y docker-ce-cli docker-buildx-plugin docker-compose-plugin
      - name: Registry Login
        uses: docker/login-action@v3
        with:
          registry: https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          username: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
          password: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Build and Push 
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ false && github.event_name == 'push' && format('{0}/{1}/dtvp:{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
            ${{ false && github.event_name == 'push' && format('{0}/{1}/dtvp:{2}-alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/dtvp:pr-{2}-alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, github.event.pull_request.number) || '' }}
          context: .
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Create Git Tag
        if: false && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

  delete-pr-images:
    if: github.event.action == 'closed'
    runs-on: node
    steps:
      - name: Delete PR Image Tag
        run: |-
          VERSION="pr-${{ github.event.pull_request.number }}-alpine"
          echo "Deleting version $VERSION for dtvp"
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/packages/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/container/dtvp/$VERSION"
