name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: build-publish-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: node
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: uv sync --frozen
      - name: Audit Python dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: uv run --frozen pip-audit --local --progress-spinner=off --vulnerability-service=osv --timeout=30
      - name: Scan Python source for security issues
        run: uv run --frozen bandit -ll -ii -c pyproject.toml -r dtvp agentyzer/src
      - name: Validate OKF documentation
        run: uv run --frozen python scripts/validate-okf.py docs
      - name: Prepare .env
        run: cp .env.test .env
      - name: Create dummy frontend assets
        run: |
          mkdir -p frontend/dist
          cp tests/assets/index.html frontend/dist/index.html
      - name: Run tests with coverage
        run: uv run pytest
      - name: Upload Python Coverage Report
        uses: https://data.forgejo.org/actions/upload-artifact@c6a3b2bd78b3985e4b2f15397fec357f0fd808de # v3.2.2-node20
        if: always()
        with:
          name: python-coverage-report
          path: htmlcov/
          retention-days: 30

  test-frontend:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: node
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci --include=optional
      - name: Reject disabled Node TLS verification
        run: ./scripts/check-node-tls.sh
      - name: Audit frontend dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd frontend && npm audit --audit-level=high
      - name: Audit SBOM tooling dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: cd frontend/sbom-tool && npm ci --ignore-scripts && npm audit --audit-level=high
      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:unit -- --run --coverage
      - name: Upload Vitest Coverage Report
        uses: https://data.forgejo.org/actions/upload-artifact@c6a3b2bd78b3985e4b2f15397fec357f0fd808de # v3.2.2-node20
        if: always()
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 30

  test-agentyzer:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: node
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd agentyzer && uv sync --frozen
      - name: Run tests
        working-directory: agentyzer
        run: uv run pytest

  test-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: node
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci --include=optional
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=line
      - name: Upload Playwright Report
        uses: https://data.forgejo.org/actions/upload-artifact@c6a3b2bd78b3985e4b2f15397fec357f0fd808de # v3.2.2-node20
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  scan-images:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [test-backend, test-frontend, test-agentyzer, test-e2e]
    runs-on: node
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install Docker CLI
        run: |-
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
            "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" > /etc/apt/sources.list.d/docker.list
          for i in {1..3}; do apt-get -qq update && break || sleep 5; done
          DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -qq -y docker-ce-cli docker-buildx-plugin docker-compose-plugin
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0
          cache: false
      - name: Build DTVP security candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: dtvp-security-candidate:${{ github.sha }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
      - name: Scan DTVP security candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: dtvp-security-candidate:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: HIGH,CRITICAL
          skip-setup-trivy: true
          cache: false
      - name: Build Agentyzer security candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./agentyzer
          load: true
          tags: agentyzer-security-candidate:${{ github.sha }}
      - name: Scan Agentyzer security candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: agentyzer-security-candidate:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: os,library
          severity: HIGH,CRITICAL
          skip-setup-trivy: true
          cache: false

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [scan-images]
    runs-on: node
    timeout-minutes: 10
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      tag: ${{ steps.get_version.outputs.TAG }}
      tag_exists: ${{ steps.check_tag.outputs.TAG_EXISTS }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      - name: Check Git Tag
        id: check_tag
        run: |
          TAG=${{ steps.get_version.outputs.TAG }}
          if git tag -l | grep -q "^${TAG}$"; then
            echo "Git tag ${TAG} already exists — skipping release tag creation."
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

  create-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.tag_exists == 'false'
    needs: [check-version]
    runs-on: node
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"
      - name: Create and push git tag
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

  build-push-images:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs: [scan-images]
    runs-on: node
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Docker Cli
        run: |-
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
            "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" > /etc/apt/sources.list.d/docker.list
          for i in {1..3}; do apt-get -qq update && break || sleep 5; done
          DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -qq -y docker-ce-cli docker-buildx-plugin docker-compose-plugin
      - name: Registry Login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          username: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
          password: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Generate CycloneDX SBOMs
        run: ./scripts/generate-sboms.sh
      - name: Upload SBOM artifacts
        uses: https://data.forgejo.org/actions/upload-artifact@c6a3b2bd78b3985e4b2f15397fec357f0fd808de # v3.2.2-node20
        with:
          name: dtvp-sbom
          path: sbom/*.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          platforms: linux/amd64
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Extract Version
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(uv version | awk '{print $2}')
            VERSION="v${VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate CHANGELOG.md for Docker
        run: |
          uv run git-cliff -o CHANGELOG.md
      - name: Build and Push DTVP
        id: build_dtvp
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: true
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          tags: |
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/dtvp:dev', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/{1}/dtvp:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && steps.get_version.outputs.VERSION && format('{0}/{1}/dtvp:{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
          context: .
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
      - name: Build and Push Agentyzer
        id: build_agentyzer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          push: true
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          tags: |
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/agentyzer:dev', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/{1}/agentyzer:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && steps.get_version.outputs.VERSION && format('{0}/{1}/agentyzer:{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
          context: ./agentyzer
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release image digests
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DTVP_IMAGE_DIGEST: ${{ steps.build_dtvp.outputs.digest }}
          AGENTYZER_IMAGE_DIGEST: ${{ steps.build_agentyzer.outputs.digest }}
          PACKAGE_REGISTRY_HOST: ${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          PACKAGE_REGISTRY_USER: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
        run: |
          : "${COSIGN_PRIVATE_KEY:?COSIGN_PRIVATE_KEY is required for release signing}"
          : "${COSIGN_PASSWORD:?COSIGN_PASSWORD is required for release signing}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "${PACKAGE_REGISTRY_HOST}/${PACKAGE_REGISTRY_USER}/dtvp@${DTVP_IMAGE_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            "${PACKAGE_REGISTRY_HOST}/${PACKAGE_REGISTRY_USER}/agentyzer@${AGENTYZER_IMAGE_DIGEST}"
          cosign public-key --key env://COSIGN_PRIVATE_KEY > /tmp/dtvp-cosign.pub
          cosign verify --key /tmp/dtvp-cosign.pub \
            "${PACKAGE_REGISTRY_HOST}/${PACKAGE_REGISTRY_USER}/dtvp@${DTVP_IMAGE_DIGEST}"
          cosign verify --key /tmp/dtvp-cosign.pub \
            "${PACKAGE_REGISTRY_HOST}/${PACKAGE_REGISTRY_USER}/agentyzer@${AGENTYZER_IMAGE_DIGEST}"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-push-images]
    runs-on: node
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure Git
        run: |
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"

      - name: Set version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG.md with git-cliff
        run: |
          uv run git-cliff --tag ${{ steps.version.outputs.TAG }} -o CHANGELOG.md
          echo "--- Preview (last 40 lines) ---"
          tail -40 CHANGELOG.md

      - name: Extract release notes for this version
        id: release_notes
        run: |
          NOTES=$(uv run git-cliff --tag ${{ steps.version.outputs.TAG }} --unreleased --strip all 2>/dev/null || uv run git-cliff --latest --strip all)
          echo "NOTES<<HEREDOC" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "HEREDOC" >> $GITHUB_OUTPUT

      - name: Create Forgejo Release
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/repos/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/dtvp/releases" \
            -d "$(jq -n \
              --arg tag "${{ steps.version.outputs.TAG }}" \
              --arg name "Release ${{ steps.version.outputs.TAG }}" \
              --arg body "${{ steps.release_notes.outputs.NOTES }}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}'\
            )"
