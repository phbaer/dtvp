# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""

# Template for the changelog body (per version)
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }}
{% endfor %}
{%- endfor %}\n
"""

# Template for the changelog footer
footer = ""

# Remove the leading and trailing whitespace from the template
trim = true

[git]
# Parse the commits based on conventional commits specification
conventional_commits = true

# Filter out commits that don't match the conventional commits spec
filter_unconventional = false

# Regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🔨 Refactoring" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^chore\\(deps\\)", group = "📦 Dependencies" },
  { message = "^chore", group = "🔧 Maintenance" },
  { message = "^ci", group = "🔧 Maintenance" },
  { message = "^style", group = "💅 Style" },
  # Catch Forgejo/Gitea merge commit messages
  # Renovate historic messages (before semanticCommits was enabled)
  { message = "^Merge pull request 'Update dependency", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request 'Update .+ action", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request 'Update .+ Docker", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request", group = "🔀 Merged PRs", skip = false },
  { message = "^Merge branch", skip = true },
  { body = ".*security", group = "🔒 Security" },
  # Skip version bump commits generated by CI
  { message = "^chore: update changelog", skip = true },
]

# Strip Forgejo trailers and extra blank lines from commit bodies
commit_preprocessors = [
  { pattern = "\nReviewed-on:.*", replace = "" },
  { pattern = "\nCo-authored-by:.*", replace = "" },
  { pattern = "\n\n", replace = "" },
]

# Protect breaking changes from being skipped due to the filters
protect_breaking_commits = true

# Filter out the commits that are not matched by commit parsers
filter_commits = false

# Regex for matching git tags
tag_pattern = "v[0-9].*"

# Sort commits by their date for the changelog
sort_commits = "newest"
