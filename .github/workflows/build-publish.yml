name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  test-backend:
    if: github.event.action != 'closed' && startsWith(github.server_url, 'https://github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: uv sync --frozen
      - name: Prepare .env
        run: cp .env.test .env
      - name: Create dummy frontend assets
        run: |
          mkdir -p frontend/dist
          cp tests/assets/index.html frontend/dist/index.html
      - name: Run tests with coverage
        run: uv run pytest
      - name: Upload Python Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-report
          path: htmlcov/
          retention-days: 30

  test-frontend:
    if: github.event.action != 'closed' && startsWith(github.server_url, 'https://github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci
      - name: Prepare .env
        run: cp .env.test .env
      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:unit -- --run --coverage
      - name: Upload Vitest Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 30
      - name: Install Playwright browsers
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npx playwright install --with-deps chromium
      - name: Run UI tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm run test:ui -- --reporter=line
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  build-push-images:
    if: github.event.action != 'closed' && startsWith(github.server_url, 'https://github.com')
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry Login
        uses: docker/login-action@v3
        with:
          registry: https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          username: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
          password: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64
      - name: Build and Push 
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/dtvp:pr-{2}-alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, github.event.pull_request.number) || '' }}
          context: .
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
