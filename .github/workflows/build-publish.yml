name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  test-backend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: uv sync --frozen
      - name: Prepare .env
        run: cp .env.test .env
      - name: Create dummy frontend assets
        run: |
          mkdir -p frontend/dist
          cp tests/assets/index.html frontend/dist/index.html
      - name: Run tests with coverage
        run: uv run pytest
      - name: Upload Python Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-coverage-report
          path: htmlcov/
          retention-days: 30

  test-frontend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci --include=optional
      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:unit -- --run --coverage
      - name: Upload Vitest Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 30

  test-agentyzer:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd agentyzer && uv sync --frozen
      - name: Run tests
        working-directory: agentyzer
        run: uv run pytest

  test-e2e:
    if: github.event.action != 'closed'
    runs-on: node
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci --include=optional
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=line
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, test-agentyzer, test-e2e]
    runs-on: node
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      tag: ${{ steps.get_version.outputs.TAG }}
      tag_exists: ${{ steps.check_tag.outputs.TAG_EXISTS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      - name: Check Git Tag
        id: check_tag
        run: |
          TAG=${{ steps.get_version.outputs.TAG }}
          if git tag -l | grep -q "^${TAG}$"; then
            echo "Git tag ${TAG} already exists — skipping release tag creation."
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

  create-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.tag_exists == 'false'
    needs: [check-version]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"
      - name: Create and push git tag
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

  build-push-images:
    if: github.event.action != 'closed' && (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs: [test-backend, test-frontend, test-agentyzer]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Docker Cli
        run: |-
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
            "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" > /etc/apt/sources.list.d/docker.list
          for i in {1..3}; do apt-get -qq update && break || sleep 5; done
          DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -qq -y docker-ce-cli docker-buildx-plugin docker-compose-plugin
      - name: Registry Login
        uses: docker/login-action@v4
        with:
          registry: https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          username: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
          password: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Generate Backend CycloneDX SBOM (Python)
        run: |
          mkdir -p sbom
          uv add --dev cyclonedx-bom
          uv run cyclonedx-py environment --short-PURLs -o sbom/dtvp-backend-cyclonedx.json --sv 1.6 --mc-type application --pyproject pyproject.toml

      - name: Generate Frontend CycloneDX SBOM (npm)
        run: |
          cd frontend
          npm install --save-dev --silent @cyclonedx/bom
          ./node_modules/.bin/cyclonedx-npm --omit dev --mc-type application -o ../sbom/dtvp-frontend-cyclonedx.json --ignore-npm-errors --package-lock-only package.json
      - name: Generate Agentyzer CycloneDX SBOM (Python)
        working-directory: agentyzer
        run: |
          mkdir -p ../sbom
          uv add --dev cyclonedx-bom
          uv run cyclonedx-py environment --short-PURLs -o ../sbom/agentyzer-cyclonedx.json --sv 1.6 --mc-type application --pyproject pyproject.toml
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dtvp-sbom
          path: sbom/*.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(uv version | awk '{print $2}')
            VERSION="v${VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate CHANGELOG.md for Docker
        run: |
          uv run git-cliff -o CHANGELOG.md
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/dtvp:pr-{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, github.event.pull_request.number) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/dtvp:dev', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/{1}/dtvp:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && steps.get_version.outputs.VERSION && format('{0}/{1}/dtvp:{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
          context: .
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Build and Push Agentyzer
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/agentyzer:pr-{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, github.event.pull_request.number) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}/agentyzer:dev', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/{1}/agentyzer:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && steps.get_version.outputs.VERSION && format('{0}/{1}/agentyzer:{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
          context: ./agentyzer
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-push-images]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure Git
        run: |
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"

      - name: Set version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG.md with git-cliff
        run: |
          uv run git-cliff --tag ${{ steps.version.outputs.TAG }} -o CHANGELOG.md
          echo "--- Preview (last 40 lines) ---"
          tail -40 CHANGELOG.md

      - name: Extract release notes for this version
        id: release_notes
        run: |
          NOTES=$(uv run git-cliff --tag ${{ steps.version.outputs.TAG }} --unreleased --strip all 2>/dev/null || uv run git-cliff --latest --strip all)
          echo "NOTES<<HEREDOC" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "HEREDOC" >> $GITHUB_OUTPUT

      - name: Create Forgejo Release
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/repos/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/dtvp/releases" \
            -d "$(jq -n \
              --arg tag "${{ steps.version.outputs.TAG }}" \
              --arg name "Release ${{ steps.version.outputs.TAG }}" \
              --arg body "${{ steps.release_notes.outputs.NOTES }}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}'\
            )"

  delete-pr-images:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: node
    steps:
      - name: Delete PR Image Tag
        run: |-
          VERSION="pr-${{ github.event.pull_request.number }}"
          echo "Deleting version $VERSION for dtvp"
          curl -fsS -X DELETE \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/packages/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/container/dtvp/$VERSION" || true
          echo "Deleting version $VERSION for agentyzer"
          curl -fsS -X DELETE \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/packages/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/container/agentyzer/$VERSION" || true
