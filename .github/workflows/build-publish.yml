name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  test-backend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: uv sync --frozen
      - name: Prepare .env
        run: cp .env.test .env
      - name: Create dummy frontend assets
        run: |
          mkdir -p frontend/dist
          cp tests/assets/index.html frontend/dist/index.html
      - name: Run tests with coverage
        run: uv run pytest
      - name: Upload Python Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-coverage-report
          path: htmlcov/
          retention-days: 30

  test-frontend:
    if: github.event.action != 'closed'
    runs-on: node
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies (backend)
        run: uv sync --frozen
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm ci
      - name: Prepare .env
        run: cp .env.test .env
      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:unit -- --run --coverage
      - name: Upload Vitest Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vitest-coverage-report
          path: frontend/coverage/
          retention-days: 30
      - name: Start Dev Stack
        run: |
          npm install -g pm2
          pm2 start ecosystem.config.js
          echo "Waiting for stack to spin up..."
          sleep 15
          pm2 list
          pm2 logs --lines 50 --nostream
      - name: Verify Reachability
        run: |
          curl -f -H "X-Api-Key: mock_key" http://localhost:8081/api/v1/project
          curl -f http://localhost:8000/api/version
          curl -Is http://localhost:5173 | head -n 1
      - name: Install Playwright browsers
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npx playwright install --with-deps chromium
      - name: Run UI tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cd frontend && npm run test:ui -- --reporter=line
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
      - name: Stop Dev Stack
        if: always()
        run: pm2 kill || true

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend]
    runs-on: node
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      tag_exists: ${{ steps.check_tag.outputs.TAG_EXISTS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      - name: Check Git Tag
        id: check_tag
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          if git tag -l | grep -q "^v${VERSION}$"; then
            echo "Git tag v$VERSION already exists — skipping release."
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

  build-push-images:
    if: github.event.action != 'closed'
    needs: [test-backend, test-frontend]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Docker Cli
        run: |-
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
            "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" > /etc/apt/sources.list.d/docker.list
          for i in {1..3}; do apt-get -qq update && break || sleep 5; done
          DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -qq -y docker-ce-cli docker-buildx-plugin docker-compose-plugin
      - name: Registry Login
        uses: docker/login-action@v4
        with:
          registry: https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}
          username: ${{ vars.RUNNER_PACKAGE_PUSH_USER }}
          password: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
      - name: Generate Backend CycloneDX SBOM (Python)
        run: |
          mkdir -p sbom
          uv add --dev cyclonedx-bom
          uv run cyclonedx-py environment --short-PURLs -o sbom/dtvp-backend-cyclonedx.json --sv 1.6 --mc-type application --pyproject pyproject.toml

      - name: Generate Frontend CycloneDX SBOM (npm)
        run: |
          cd frontend
          npm install --save-dev --silent @cyclonedx/bom
          ./node_modules/.bin/cyclonedx-npm --omit dev --mc-type application -o ../sbom/dtvp-frontend-cyclonedx.json --ignore-npm-errors --package-lock-only package.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dtvp-sbom
          path: sbom/*.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(uv version | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate CHANGELOG.md for Docker
        run: |
          uv run git-cliff -o CHANGELOG.md
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/dtvp:latest', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER) || '' }}
            ${{ github.event_name == 'push' && steps.get_version.outputs.VERSION && format('{0}/{1}/dtvp:v{2}', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, steps.get_version.outputs.VERSION) || '' }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/dtvp:pr-{2}-alpine', vars.RUNNER_PACKAGE_PUSH_HOST, vars.RUNNER_PACKAGE_PUSH_USER, github.event.pull_request.number) || '' }}
          context: .
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.tag_exists == 'false'
    needs: [check-version, build-push-images]
    runs-on: node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure Git
        run: |
          git config --global user.name "Gitea Actions"
          git config --global user.email "actions@gitea.io"

      - name: Set version
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG.md with git-cliff
        run: |
          uv run git-cliff --tag ${{ steps.version.outputs.TAG }} -o CHANGELOG.md
          echo "--- Preview (last 40 lines) ---"
          tail -40 CHANGELOG.md

      - name: Extract release notes for this version
        id: release_notes
        run: |
          NOTES=$(uv run git-cliff --tag ${{ steps.version.outputs.TAG }} --unreleased --strip all 2>/dev/null || uv run git-cliff --latest --strip all)
          echo "NOTES<<HEREDOC" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "HEREDOC" >> $GITHUB_OUTPUT

      - name: Create and push git tag
        run: |
          git tag -a "${{ steps.version.outputs.TAG }}" -m "Release ${{ steps.version.outputs.TAG }}"
          git push origin HEAD:main --follow-tags

      - name: Create Forgejo Release
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/repos/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/dtvp/releases" \
            -d "$(jq -n \
              --arg tag "${{ steps.version.outputs.TAG }}" \
              --arg name "Release ${{ steps.version.outputs.TAG }}" \
              --arg body "${{ steps.release_notes.outputs.NOTES }}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}'\
            )"

  delete-pr-images:
    if: github.event.action == 'closed'
    runs-on: node
    steps:
      - name: Delete PR Image Tag
        run: |-
          VERSION="pr-${{ github.event.pull_request.number }}-alpine"
          echo "Deleting version $VERSION for dtvp"
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.RUNNER_PACKAGE_PUSH_TOKEN }}" \
            "https://${{ vars.RUNNER_PACKAGE_PUSH_HOST }}/api/v1/packages/${{ vars.RUNNER_PACKAGE_PUSH_USER }}/container/dtvp/$VERSION"
